[project]
name = "processor"
version = "0.1.0"
description = "GitHub Star Data Processor (DB/Taggger/Search)"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
ml = ["scikit-learn>=1.4"]
llm = [
  "sentence-transformers>=3.0.0",
  "httpx>=0.27.0"
]
mariadb = ["pymysql>=1.1"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
